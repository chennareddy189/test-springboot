# CI workflow for SimpleJavaProject
# Notes:
# - Keeps build and docker jobs running on GitHub-hosted runners (ubuntu-latest).
# - The `deploy` job can be run on a self-hosted runner when you need access to a
#   local Kubernetes cluster. To run `deploy` on a self-hosted runner, change
#   `runs-on: ubuntu-latest` for that job to something like
#     runs-on: [self-hosted, macos, local]
#   Make sure the self-hosted runner labels match and the runner is online.
# - If you prefer to run an ephemeral cluster inside CI for testing, consider
#   adding a `kind` setup step to create a local cluster inside the workflow.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ...existing code...

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn -B -U clean verify

      - name: Check for built JAR
        id: check_jar
        run: |
          echo "Listing target/"
          ls -la target || true
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "jar_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "jar_found=false" >> "$GITHUB_OUTPUT"
            echo "ERROR: No JAR found in target/. Check the build logs above." >&2
            exit 1
          fi

      - name: Upload jar artifact
        if: ${{ steps.check_jar.outputs.jar_found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    name: Build and push Docker image (optional)
    needs: build
    runs-on: ubuntu-latest
    # Do not use `secrets` in a job-level `if:` — the workflow parser cannot resolve
    # `secrets` there. Instead check secrets on the individual steps that need them.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build jar for Docker
        run: mvn -B -U -DskipTests package

      - name: Check Docker secrets
        id: check_secrets
        run: |
          # Determine if required secrets are present. We avoid referencing
          # secrets in expression `if:` to prevent parse-time errors.
          if [ -z "${{ secrets.DOCKER_REGISTRY }}" ] || [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "secrets_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to registry
        if: ${{ steps.check_secrets.outputs.secrets_missing == 'false' }}
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        if: ${{ steps.check_secrets.outputs.secrets_missing == 'false' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/simple-spring-cicd:latest

  deploy:
    name: Deploy to Kubernetes (optional)
    needs: docker
    # Run deploy on your self-hosted runner so it can access local kubernetes clusters
    # Make sure the runner was configured with labels: self-hosted, macos, local
    runs-on: [self-hosted, macos, local]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Check for KUBE_CONFIG_DATA secret
        id: check_kube
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_DATA }}" ]; then
            echo "kube_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "kube_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure kubeconfig
        if: ${{ steps.check_kube.outputs.kube_missing == 'false' }}
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          mkdir -p $HOME/.kube
          mv kubeconfig $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          # Ensure kubectl uses the written config
          export KUBECONFIG=$HOME/.kube/config

      - name: Verify cluster access
        if: ${{ steps.check_kube.outputs.kube_missing == 'false' }}
        run: |
          # Show client version
          kubectl version --client || true
          # Show current context (does not reveal credentials)
          kubectl config current-context || true
          # Try a lightweight API call to confirm the API server is reachable
          if kubectl get ns >/dev/null 2>&1; then
            echo "Kubernetes API reachable"
          else
            echo "ERROR: kubectl cannot reach the API server. Check the provided KUBE_CONFIG_DATA and that the target cluster is running." >&2
            echo "kubectl config view (minified):"
            kubectl config view --minify || true
            echo "kubectl cluster-info output:" || true
            kubectl cluster-info || true
            exit 1
          fi

      - name: Create imagePullSecret (if registry credentials provided)
        if: ${{ steps.check_kube.outputs.kube_missing == 'false' }}
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          # Only attempt to create the secret when registry creds are provided.
          if [ -z "${DOCKER_REGISTRY}" ] || [ -z "${DOCKER_USERNAME}" ] || [ -z "${DOCKER_PASSWORD}" ]; then
            echo "No registry credentials provided; skipping imagePullSecret creation."
          else
            echo "Creating/patching imagePullSecret 'regcred' in current namespace"
            kubectl create secret docker-registry regcred \
              --docker-server="${DOCKER_REGISTRY}" \
              --docker-username="${DOCKER_USERNAME}" \
              --docker-password="${DOCKER_PASSWORD}" \
              --docker-email="ci@example.com" || true
            # Patch default serviceaccount in the namespace so pods will use the secret by default
            kubectl patch serviceaccount default -p '{"imagePullSecrets":[{"name":"regcred"}]}' || true
          fi

      - name: Deploy manifests and update image
        if: ${{ steps.check_kube.outputs.kube_missing == 'false' }}
        env:
          # You can override IMAGE_NAME by setting a repo secret IMAGE_NAME, otherwise falls back
          # to the same image tag used in the Docker job.
          IMAGE_NAME: ${{ secrets.IMAGE_NAME || format('{0}/{1}/simple-spring-cicd:latest', secrets.DOCKER_REGISTRY, secrets.DOCKER_USERNAME) }}
        run: |
          echo "Using image: $IMAGE_NAME"
          # Update the deployment image (no-op if the deployment doesn't yet exist)
          # --record is deprecated; omit it to avoid warnings
          kubectl set image deployment/simple-spring simple-spring=$IMAGE_NAME || true
          # Apply local manifests (will create or update resources). If API server is temporarily unreachable
          # fallback to applying without validation to avoid openapi validation failures in some environments.
          if ! kubectl apply -f k8s/deployment.yaml; then
            echo "kubectl apply failed; retrying with --validate=false"
            kubectl apply --validate=false -f k8s/deployment.yaml
          fi
          if ! kubectl apply -f k8s/service.yaml; then
            echo "kubectl apply failed; retrying with --validate=false"
            kubectl apply --validate=false -f k8s/service.yaml
          fi

