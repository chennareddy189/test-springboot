name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download jar artifact
        # The `build` job uploads the built JAR as artifact `app-jar`.
        # We need to download it into `target/` so the Docker build can COPY it.
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn -B -U clean verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    name: Build and push Docker image (optional)
    needs: build
    runs-on: ubuntu-latest
    # Do not use `secrets` in a job-level `if:` — the workflow parser cannot resolve
    # `secrets` there. Instead check secrets on the individual steps that need them.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker secrets
        id: check_secrets
        run: |
          # Determine if required secrets are present. We avoid referencing
          # secrets in expression `if:` to prevent parse-time errors.
          if [ -z "${{ secrets.DOCKER_REGISTRY }}" ] || [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "secrets_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to registry
        if: ${{ steps.check_secrets.outputs.secrets_missing == 'false' }}
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        if: ${{ steps.check_secrets.outputs.secrets_missing == 'false' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/simple-spring-cicd:latest

